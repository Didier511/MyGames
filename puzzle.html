<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Flux: Audio Protocol</title>
    <style>
        body { background: #05050a; color: #0ff; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; transition: transform 0.8s ease-in-out; }
        #stats-bar { position: absolute; top: 20px; display: flex; gap: 40px; font-weight: bold; border-bottom: 1px solid #0ff; padding-bottom: 10px; }
        #grid { display: grid; grid-template-columns: repeat(5, 75px); gap: 8px; background: rgba(0, 255, 255, 0.05); padding: 15px; border: 1px solid #0ff; border-radius: 10px; transition: 0.8s; }
        .tile { width: 75px; height: 75px; background: #111; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; transition: 0.3s; border-radius: 4px; }
        .line { position: absolute; background: #333; transition: background 0.4s, box-shadow 0.4s; z-index: 1; }
        .active .line { background: #0ff; box-shadow: 0 0 15px #0ff; }
        .pipe-0 .line { width: 100%; height: 12px; } 
        .pipe-1 .line-1 { width: 12px; height: 50%; top: 0; } 
        .pipe-1 .line-2 { width: 50%; height: 12px; right: 0; } 
        .source { border: 3px solid #0f0 !important; }
        .core { border: 3px solid #f0f !important; }
        #win-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 350px; padding: 40px; background: rgba(0, 0, 0, 0.95); border-left: 4px solid #f0f;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none; opacity: 0; backdrop-filter: blur(10px);
        }
        #win-overlay.pop { transform: translate(-50%, -50%) scale(1.1); opacity: 1; pointer-events: auto; }
        #win-overlay.sidebar { left: auto; right: 0; top: 0; bottom: 0; transform: translate(0, 0) scale(1); height: 100vh; width: 30%; box-shadow: -10px 0 30px rgba(240, 0, 255, 0.2); }
        button { margin-top: 30px; padding: 15px 30px; background: #f0f; color: white; border: none; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 1rem; }
        button:hover { background: #0ff; color: black; box-shadow: 0 0 20px #0ff; }
        .locked { pointer-events: none; }
        .shift-left { transform: translateX(-15%); }
    </style>
</head>
<body>

    <div id="stats-bar">
        <div>LEVEL: <span id="level-num">1</span></div>
        <div>MOVES: <span id="moves">0</span></div>
    </div>

    <div id="game-container">
        <div id="grid"></div>
    </div>

    <div id="win-overlay">
        <h3 style="color:#f0f; letter-spacing: 5px; margin: 0;">BREACH</h3>
        <h1 style="color: #fff; margin: 10px 0; font-size: 2.5rem; text-shadow: 0 0 10px #f0f;">SUCCESS</h1>
        <h3 style="color:#f0f; letter-spacing: 5px; margin: 0;">ACCESS GRANTED</h3>
        <hr style="width: 50%; border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <p style="margin: 5px; font-size: 1.1rem; color: #888;">TOTAL MOVES</p>
        <p style="font-size: 2rem; margin: 0; color: #0ff;"><span id="final-moves">0</span></p>
        <button onclick="nextLevel()">CONTINUE HACKING</button>
    </div>

<script>
// --- AUDIO ENGINE ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration, type = 'sine', volume = 0.1) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playWinSound() {
    const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
    notes.forEach((note, i) => {
        setTimeout(() => playSound(note, 0.6, 'square', 0.05), i * 150);
    });
}

// --- GAME LOGIC ---
const size = 5;
const grid = document.getElementById('grid');
const container = document.getElementById('game-container');
const moveDisplay = document.getElementById('moves');
const levelDisplay = document.getElementById('level-num');
const winOverlay = document.getElementById('win-overlay');

let tiles = [], moves = 0, currentLevel = 1, solved = false;

function initGame() {
    grid.innerHTML = '';
    grid.classList.remove('locked');
    container.classList.remove('shift-left');
    winOverlay.classList.remove('pop', 'sidebar');
    tiles = []; moves = 0; solved = false;
    moveDisplay.innerText = moves; levelDisplay.innerText = currentLevel;

    let path = [];
    let cx = 0, cy = 0;
    path.push({x: 0, y: 0});
    
    while (cx < size - 1 || cy < size - 1) {
        if (cx < size - 1 && (Math.random() > 0.5 || cy === size - 1)) cx++;
        else if (cy < size - 1) cy++;
        path.push({x: cx, y: cy});
    }

    let gridData = Array(size * size).fill(null).map((_, i) => ({
        id: i,
        type: Math.random() > 0.5 ? 0 : 1,
        rotation: Math.floor(Math.random() * 4) * 90
    }));

    for (let i = 1; i < path.length - 1; i++) {
        const prev = path[i-1], curr = path[i], next = path[i+1];
        const idx = curr.y * size + curr.x;
        gridData[idx].type = (prev.x === next.x || prev.y === next.y) ? 0 : 1;
    }
    
    gridData[0].type = (path[1].x !== path[0].x || path[1].y !== path[0].y) ? 1 : 0;
    gridData[24].type = 1;

    gridData.forEach(data => {
        const tile = {
            ...data,
            getConnections() {
                const r = (this.rotation / 90) % 4;
                if (this.type === 0) return (r % 2 === 0) ? [1, 3] : [0, 2];
                if (r === 0) return [0, 1]; if (r === 1) return [1, 2];
                if (r === 2) return [2, 3]; return [3, 0];
            }
        };

        const div = document.createElement('div');
        div.className = `tile pipe-${tile.type}`;
        if (tile.id === 0) div.classList.add('source');
        if (tile.id === 24) div.classList.add('core');
        
        div.innerHTML = tile.type === 0 ? '<div class="line"></div>' : '<div class="line line-1"></div><div class="line line-2"></div>';
        div.style.transform = `rotate(${tile.rotation}deg)`;
        
        div.onclick = () => {
            if (solved) return;
            playSound(400, 0.1, 'triangle', 0.05); // Rotation sound
            moves++; moveDisplay.innerText = moves;
            tile.rotation += 90;
            div.style.transform = `rotate(${tile.rotation}deg)`;
            checkPath();
        };

        tile.element = div;
        tiles.push(tile);
        grid.appendChild(div);
    });
    checkPath();
}

function nextLevel() { 
    playSound(600, 0.2, 'sine', 0.1); 
    currentLevel++; 
    initGame(); 
}

function checkPath() {
    const wasActive = tiles.map(t => t.element.classList.contains('active'));
    tiles.forEach(t => t.element.classList.remove('active'));
    
    let queue = [0], visited = new Set();
    while (queue.length > 0) {
        let currIdx = queue.shift();
        if (visited.has(currIdx)) continue;
        visited.add(currIdx);
        let currTile = tiles[currIdx];
        currTile.element.classList.add('active');

        // Play subtle flow sound if a new tile becomes active
        if(!wasActive[currIdx] && moves > 0) {
            playSound(150 + (visited.size * 20), 0.2, 'sine', 0.02);
        }

        const row = Math.floor(currIdx / size), col = currIdx % size;
        currTile.getConnections().forEach(dir => {
            let nextIdx = -1, neededEntry = -1;
            if (dir === 0 && row > 0) { nextIdx = currIdx - size; neededEntry = 2; }
            if (dir === 1 && col < size - 1) { nextIdx = currIdx + 1; neededEntry = 3; }
            if (dir === 2 && row < size - 1) { nextIdx = currIdx + size; neededEntry = 0; }
            if (dir === 3 && col > 0) { nextIdx = currIdx - 1; neededEntry = 1; }
            if (nextIdx !== -1 && tiles[nextIdx].getConnections().includes(neededEntry)) queue.push(nextIdx);
        });
    }

    if (tiles[24].element.classList.contains('active')) {
        solved = true; grid.classList.add('locked');
        document.getElementById('final-moves').innerText = moves;
        playWinSound();
        winOverlay.classList.add('pop');
        setTimeout(() => { winOverlay.classList.add('sidebar'); container.classList.add('shift-left'); }, 1200);
    }
}
initGame();
</script>
</body>
</html>
